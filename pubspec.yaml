name: resizable_splitter
description: "Accessible splitter widget for Flutter layouts that need drag-to-resize panels."
version: 2.1.2

homepage: https://github.com/omar-hanafy/resizable_splitter
repository: https://github.com/omar-hanafy/resizable_splitter
issue_tracker: https://github.com/omar-hanafy/resizable_splitter/issues
documentation: https://github.com/omar-hanafy/resizable_splitter#readme

topics:
  - layout
  - divider
  - split-view
  - drag
  - resize

environment:
  # Dart 3.9.2 ships with Flutter 3.35; the floors must agree. (The source also
  # uses `_` wildcard parameters, which require Dart 3.7+, so the old 3.22 floor
  # could never compile.)
  sdk: ">=3.9.2 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  meta: ^1.18.0
dev_dependencies:
  fake_async: ^1.3.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
