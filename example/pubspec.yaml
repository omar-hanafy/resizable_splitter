name: resizable_splitter_example
description: "Interactive showcase for the resizable_splitter package - a constraint-solver split view for Flutter."
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  resizable_splitter:
    path: ../
  url_launcher: ^6.3.0
  # Ensures adaptive Cupertino glyphs (e.g. the text-selection toolbar on Apple
  # platforms) have a font to render with.
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    # Bundled variable fonts (one file per family covers every weight). Bundling
    # keeps the GitHub Pages build self-contained: no runtime font fetch, no FOUT.
    - family: Bricolage Grotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque.ttf
    - family: Hanken Grotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
