<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="An interactive showcase for resizable_splitter - a two-pane, drag-to-resize split view for Flutter built on one pure constraint solver. Store the intent, resolve every frame.">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0C0E12">

  <!-- Open Graph -->
  <meta property="og:title" content="resizable_splitter">
  <meta property="og:description" content="Store the intent. Resolve every frame. A constraint-solver split view for Flutter.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="resizable_splitter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>resizable_splitter - drag-to-resize split views for Flutter</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0C0E12;
      overflow: hidden;
    }
    /* Loading splash on the same graphite as the app's first paint, so there is
       no white flash before Flutter boots. Flutter's opaque scene covers it. */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0C0E12;
      z-index: 0;
    }
    #splash .mark {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 2px solid #2A2F3A;
      position: relative;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #splash .mark::after {
      content: "";
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 60%;
      width: 2px;
      border-radius: 2px;
      background: #FFC15A;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(0.96); }
      50%      { opacity: 1;   transform: scale(1.0); }
    }
  </style>
</head>
<body>
  <div id="splash"><div class="mark"></div></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
